# Contract-clause cube. [spec §5.1]
cubes:
  - name: contract_clauses
    sql: >
      SELECT * FROM read_csv_auto('/data/contract_clauses.csv', header=true)
    dimensions:
      - name: id
        sql: id
        type: string
        primary_key: true
      - name: contract_id
        sql: contract_id
        type: string
      - name: clause_type
        sql: clause_type
        type: string
      - name: text
        sql: text
        type: string
    measures:
      - name: count
        type: count
