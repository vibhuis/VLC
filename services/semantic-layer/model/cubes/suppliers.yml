# Supplier cube — reads the synthetic CSV via DuckDB. [spec §5.1]
cubes:
  - name: suppliers
    sql: >
      SELECT * FROM read_csv_auto('/data/suppliers.csv', header=true)
    joins:
      - name: contracts
        relationship: one_to_many
        sql: "{CUBE}.id = {contracts}.supplier_id"
      - name: consents
        relationship: one_to_many
        sql: "{CUBE}.id = {consents}.supplier_id"
    dimensions:
      - name: id
        sql: id
        type: string
        primary_key: true
      - name: name
        sql: name
        type: string
      - name: region
        sql: region
        type: string
      - name: geo
        sql: geo
        type: string
      - name: data_residency
        sql: data_residency
        type: string
      - name: gdpr_consent_status
        sql: gdpr_consent_status
        type: string
      - name: risk_tier
        sql: risk_tier
        type: string
      - name: delivery_risk_score
        sql: delivery_risk_score
        type: number
      - name: delivery_at_risk
        sql: delivery_at_risk
        type: boolean
      - name: erp_id
        sql: erp_id
        type: string
      - name: mes_id
        sql: mes_id
        type: string
      - name: cms_id
        sql: cms_id
        type: string
    measures:
      - name: count
        type: count
      - name: avg_delivery_risk_score
        sql: delivery_risk_score
        type: avg
