name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    name: lint · opa · pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check services data scripts

      - name: Install OPA
        run: |
          curl -fsSL -o opa https://openpolicyagent.org/downloads/v0.68.0/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa

      - name: OPA policy unit tests
        run: opa test services/policy-engine/policies -v

      - name: Start OPA server (for policy client + parity tests)
        run: |
          opa run --server --addr localhost:8181 services/policy-engine/policies &
          for _ in $(seq 1 20); do curl -fsS localhost:8181/health && break || sleep 1; done

      - name: Regenerate synthetic data (determinism check)
        run: |
          uv run python data/synthetic/generate.py
          git diff --exit-code data/synthetic services/context-graph/seed/load.cypher \
            || (echo "::error::generator output drifted — commit regenerated data" && exit 1)

      - name: Pytest (hermetic + policy)
        run: uv run pytest -q

  e2e:
    name: docker compose smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start the stack
        run: docker compose up -d --build

      - name: Wait + smoke test
        run: |
          python -m pip install --quiet httpx
          python scripts/smoke.py

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Tear down
        if: always()
        run: docker compose down -v
